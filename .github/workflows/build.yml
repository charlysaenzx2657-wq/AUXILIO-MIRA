name: Build APK - AUXILIO MIRA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.2"

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar APK Debug
        run: gradle assembleDebug --stacktrace

      - name: Compilar APK Release
        run: gradle assembleRelease --stacktrace

      - name: Subir APK Release como artifact
        uses: actions/upload-artifact@v4
        with:
          name: AUXILIO_MIRA_Release
          path: app/build/outputs/apk/release/*.apk

      - name: Subir APK Debug como artifact
        uses: actions/upload-artifact@v4
        with:
          name: AUXILIO_MIRA_Debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Crear Release automático
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "AUXILIO MIRA v1.0.${{ github.run_number }}"
          body: |
            ## 🎯 AUXILIO MIRA - Free Fire System Optimizer
            
            **520 comandos Settings Database organizados en 8 módulos:**
            - 👆 Velocidad del Puntero Calibrada (89 cmds)
            - 🌀 Giroscopio Pro (70 cmds)
            - 🖥️ FPS y Pantalla Max (72 cmds)
            - ⚡ Rendimiento CPU y RAM (84 cmds)
            - 🌐 Red y Anti-Lag (81 cmds)
            - ♿ Talkback OFF Total (40 cmds)
            - 🔋 Modo Gaming Anti-Thermal (43 cmds)
            - 🔊 Audio y Vibración Gaming (41 cmds)
            
            **Requisito:** Ejecutar comando ADB una sola vez:
            ```
            adb shell pm grant com.auxiliomira.app android.permission.WRITE_SECURE_SETTINGS
            ```
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
